<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #111;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .toggle-label {
      color: #ccc;
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #2563eb; }
    input:checked + .slider::before { transform: translateX(20px); }
    .shortcut {
      color: #666;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }
    .shortcut kbd {
      background: #222;
      color: #aaa;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="header">📸 Screenshot Pro</div>
  <div class="toggle-row">
    <span class="toggle-label">Botón flotante</span>
    <label class="switch">
      <input type="checkbox" id="toggleBtn">
      <span class="slider"></span>
    </label>
  </div>
  <div class="shortcut">Atajo: <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>S</kbd></div>
  <script src="popup.js"></script>
</body>
</html>
